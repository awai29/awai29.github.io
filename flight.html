<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Flight Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 0; left: 0;
  color: #fff;
  padding: 16px 20px;
  pointer-events: none;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
}
#score { font-size: 26px; font-weight: bold; letter-spacing: 1px; }
#speed { font-size: 14px; opacity: 0.85; margin-top: 6px; }
#throttle-bar-wrap {
  margin-top: 8px;
  width: 120px;
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
  overflow: hidden;
}
#throttle-bar {
  height: 100%;
  width: 50%;
  background: linear-gradient(90deg, #00cc66, #ffcc00);
  border-radius: 3px;
  transition: width 0.1s;
}

#altitude {
  position: absolute;
  top: 16px; right: 20px;
  color: #fff;
  font-size: 14px;
  pointer-events: none;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  text-align: right;
}

#crosshair {
  position: absolute;
  top: 50%; left: 50%;
  width: 20px; height: 20px;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.6);
}
#crosshair::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }
#crosshair::after  { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-50%); }

#hint {
  position: absolute;
  bottom: 18px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.55);
  font-size: 12px;
  text-align: center;
  pointer-events: none;
  white-space: nowrap;
}

#finish-msg {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  text-align: center;
  pointer-events: none;
  text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}
#finish-msg h1 { font-size: 48px; margin-bottom: 8px; }
#finish-msg p  { font-size: 20px; opacity: 0.8; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="hud">
  <div id="score">Rings: 0 / 15</div>
  <div id="speed">Speed: 0 km/h</div>
  <div id="throttle-bar-wrap"><div id="throttle-bar"></div></div>
</div>
<div id="altitude">ALT: 0 m<br><span id="next-dist" style="font-size:12px;opacity:0.7;"></span></div>
<div id="crosshair"></div>
<div id="hint">W/S · Pitch &nbsp;|&nbsp; A/D · Roll &nbsp;|&nbsp; Q/E · Yaw &nbsp;|&nbsp; Shift · Throttle+ &nbsp;|&nbsp; Ctrl · Throttle−</div>
<div id="finish-msg"><h1>All rings cleared!</h1><p>Refresh to fly again.</p></div>

<script type="module">
import * as THREE from 'three';

// ─── Renderer ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// ─── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6aaddc);
scene.fog = new THREE.FogExp2(0x8ec8ef, 0.003);

// ─── Camera ───────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 600);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Lighting ─────────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff0d0, 3.5);
sun.position.set(80, 150, 60);
sun.castShadow = true;
sun.shadow.mapSize.setScalar(2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 500;
sun.shadow.camera.left = sun.shadow.camera.bottom = -200;
sun.shadow.camera.right = sun.shadow.camera.top  =  200;
sun.shadow.bias = -0.0005;
scene.add(sun);

const hemi = new THREE.HemisphereLight(0x8ec8ef, 0x4a7a32, 1.8);
scene.add(hemi);

const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

// ─── Sky gradient (simple backdrop sphere) ────────────────────────────────────
{
  const skyGeo  = new THREE.SphereGeometry(500, 16, 8);
  const skyMat  = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor:    { value: new THREE.Color(0x1e6fbf) },
      bottomColor: { value: new THREE.Color(0x9fd4f5) },
      horizon:     { value: 0.3 },
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      uniform float horizon;
      varying vec3 vWorldPos;
      void main() {
        float h = normalize(vWorldPos).y;
        float t = smoothstep(-horizon, horizon, h);
        gl_FragColor = vec4(mix(bottomColor, topColor, t), 1.0);
      }
    `,
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));
}

// ─── Terrain ──────────────────────────────────────────────────────────────────
const TERRAIN_SIZE = 800;
const terrainGeo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, 120, 120);
const tPos = terrainGeo.attributes.position;
for (let i = 0; i < tPos.count; i++) {
  const x = tPos.getX(i), z = tPos.getY(i);
  const h =
    Math.sin(x * 0.018) * 12 +
    Math.cos(z * 0.015) * 10 +
    Math.sin(x * 0.055 + z * 0.04) * 5 +
    Math.cos(x * 0.08  - z * 0.07) * 3;
  tPos.setZ(i, h);
}
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshLambertMaterial({ color: 0x4a7c35 });
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.rotation.x = -Math.PI / 2;
terrain.receiveShadow = true;
scene.add(terrain);

// Sea below terrain lows
const seaMat = new THREE.MeshLambertMaterial({ color: 0x2266aa, transparent: true, opacity: 0.88 });
const sea = new THREE.Mesh(new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE), seaMat);
sea.rotation.x = -Math.PI / 2;
sea.position.y = -1;
scene.add(sea);

// ─── Clouds ───────────────────────────────────────────────────────────────────
const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.82 });

function makeCloud(x, y, z, scale = 1) {
  const g = new THREE.Group();
  const blobs = [
    { s: [3.5, 2.2, 2.5], p: [0,    0,    0   ] },
    { s: [2.5, 1.8, 2.0], p: [3.2, -0.2,  0.4 ] },
    { s: [2.0, 1.6, 1.8], p: [-2.8,-0.3, -0.3 ] },
    { s: [2.2, 1.5, 1.9], p: [1.0,  0.8,  1.2 ] },
    { s: [1.8, 1.4, 1.6], p: [-1.2, 0.6, -1.0 ] },
  ];
  for (const b of blobs) {
    const m = new THREE.Mesh(new THREE.SphereGeometry(1, 7, 5), cloudMat);
    m.scale.set(...b.s);
    m.position.set(...b.p);
    g.add(m);
  }
  g.scale.setScalar(scale);
  g.position.set(x, y, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  return g;
}

const clouds = [];
for (let i = 0; i < 50; i++) {
  const cx = (Math.random() - 0.5) * 600;
  const cy = 18 + Math.random() * 60;
  const cz = (Math.random() - 0.5) * 600;
  const sc = 0.8 + Math.random() * 1.4;
  const c  = makeCloud(cx, cy, cz, sc);
  clouds.push(c);
  scene.add(c);
}

// ─── Airplane model ───────────────────────────────────────────────────────────
// Nose points in +Z direction (local space)
function buildPlane() {
  const root = new THREE.Group();

  const bodyMat  = new THREE.MeshLambertMaterial({ color: 0xdde2ec });
  const wingMat  = new THREE.MeshLambertMaterial({ color: 0xc8cfdf });
  const engMat   = new THREE.MeshLambertMaterial({ color: 0x777788 });
  const glassMat = new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.65 });
  const redMat   = new THREE.MeshLambertMaterial({ color: 0xcc3322 });

  // Fuselage (nose → tail along +Z → -Z)
  const fuseGeo = new THREE.CylinderGeometry(0.28, 0.18, 4.0, 10);
  const fuse    = new THREE.Mesh(fuseGeo, bodyMat);
  fuse.rotation.x = Math.PI / 2;   // cylinder axis along Z
  fuse.castShadow = true;
  root.add(fuse);

  // Nose cone
  const noseGeo = new THREE.ConeGeometry(0.28, 1.0, 10);
  const nose    = new THREE.Mesh(noseGeo, bodyMat);
  nose.rotation.x = -Math.PI / 2;
  nose.position.z = 2.5;
  root.add(nose);

  // Tail taper
  const tailGeo = new THREE.ConeGeometry(0.18, 0.8, 8);
  const tail    = new THREE.Mesh(tailGeo, bodyMat);
  tail.rotation.x = Math.PI / 2;
  tail.position.z = -2.4;
  root.add(tail);

  // Main wings
  const wingGeo = new THREE.BoxGeometry(7.5, 0.10, 2.0);
  const wings   = new THREE.Mesh(wingGeo, wingMat);
  wings.position.z = -0.3;
  wings.castShadow = true;
  root.add(wings);

  // Wing tips (slight dihedral)
  for (const side of [-1, 1]) {
    const tipGeo = new THREE.BoxGeometry(1.8, 0.08, 1.2);
    const tip    = new THREE.Mesh(tipGeo, wingMat);
    tip.position.set(side * 4.2, 0.2, -0.3);
    tip.rotation.z = side * 0.18;
    root.add(tip);
  }

  // Horizontal stabiliser (tail)
  const hstabGeo = new THREE.BoxGeometry(3.2, 0.08, 0.9);
  const hstab    = new THREE.Mesh(hstabGeo, wingMat);
  hstab.position.z = -2.0;
  root.add(hstab);

  // Vertical fin
  const vfinGeo = new THREE.BoxGeometry(0.08, 1.1, 1.0);
  const vfin    = new THREE.Mesh(vfinGeo, wingMat);
  vfin.position.set(0, 0.55, -2.0);
  root.add(vfin);

  // Engine nacelles (2 under wings)
  for (const side of [-1, 1]) {
    const nacGeo = new THREE.CylinderGeometry(0.22, 0.18, 1.2, 8);
    const nac    = new THREE.Mesh(nacGeo, engMat);
    nac.rotation.x = Math.PI / 2;
    nac.position.set(side * 2.0, -0.22, -0.15);
    root.add(nac);

    // Spinner disc
    const discGeo = new THREE.CircleGeometry(0.38, 16);
    const discMat = new THREE.MeshLambertMaterial({ color: 0x222233, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
    const disc    = new THREE.Mesh(discGeo, discMat);
    disc.position.set(side * 2.0, -0.22, 0.45);
    root.add(disc);

    // Exhaust port
    const exGeo = new THREE.CylinderGeometry(0.20, 0.22, 0.1, 8);
    const ex    = new THREE.Mesh(exGeo, engMat);
    ex.rotation.x = Math.PI / 2;
    ex.position.set(side * 2.0, -0.22, -0.78);
    root.add(ex);
  }

  // Cockpit canopy
  const canopyGeo = new THREE.SphereGeometry(0.28, 8, 6, 0, Math.PI * 2, 0, Math.PI * 0.55);
  const canopy    = new THREE.Mesh(canopyGeo, glassMat);
  canopy.position.set(0, 0.32, 0.9);
  canopy.rotation.x = 0.2;
  root.add(canopy);

  // Red stripe along fuselage
  const stripeGeo = new THREE.BoxGeometry(0.04, 0.1, 3.6);
  const stripeL   = new THREE.Mesh(stripeGeo, redMat);
  stripeL.position.set( 0.28, 0, 0);
  root.add(stripeL);
  const stripeR   = new THREE.Mesh(stripeGeo, redMat);
  stripeR.position.set(-0.28, 0, 0);
  root.add(stripeR);

  return root;
}

const planeGroup = buildPlane();
scene.add(planeGroup);

// ─── Exhaust trail ────────────────────────────────────────────────────────────
const TRAIL_LEN = 24;
const trailSides = [-1, 1].map(side => {
  return Array.from({ length: TRAIL_LEN }, (_, i) => {
    const alpha = (1 - i / TRAIL_LEN) * 0.35;
    const mat   = new THREE.MeshBasicMaterial({ color: 0xddddff, transparent: true, opacity: alpha });
    const geo   = new THREE.SphereGeometry(0.12 * (1 - i / TRAIL_LEN * 0.6), 4, 3);
    const mesh  = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    return { mesh, side };
  });
});

// ─── Rings ────────────────────────────────────────────────────────────────────
const RING_COUNT   = 15;
const RING_RADIUS  = 5.5;
const RING_COLLECT = 6.0;

const rings = [];

function createRing(pos, rotY = 0, rotZ = 0) {
  const g = new THREE.Group();

  const outerMat = new THREE.MeshLambertMaterial({ color: 0xff8800, emissive: 0x331100 });
  const torus    = new THREE.Mesh(new THREE.TorusGeometry(RING_RADIUS, 0.45, 14, 40), outerMat);
  torus.castShadow = true;
  g.add(torus);

  // Inner translucent disc
  const discMat = new THREE.MeshBasicMaterial({ color: 0xffdd55, transparent: true, opacity: 0.18, side: THREE.DoubleSide });
  const disc    = new THREE.Mesh(new THREE.CircleGeometry(RING_RADIUS, 40), discMat);
  g.add(disc);

  // Glow ring
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
  const glow    = new THREE.Mesh(new THREE.RingGeometry(RING_RADIUS - 0.6, RING_RADIUS + 0.6, 40), glowMat);
  g.add(glow);

  // Pole support (vertical bar)
  const poleMat = new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: 0x111100 });
  const poleTop = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 1.5, 6), poleMat);
  poleTop.position.y = RING_RADIUS + 0.75;
  g.add(poleTop);
  const poleBot = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 1.5, 6), poleMat);
  poleBot.position.y = -(RING_RADIUS + 0.75);
  g.add(poleBot);

  g.position.copy(pos);
  g.rotation.y = rotY;
  g.rotation.z = rotZ;
  return g;
}

// Build a loose course of rings
const ringData = [
  { p: [  30,  22,  40], ry: 0.3  },
  { p: [  70,  30,  10], ry: 0.8  },
  { p: [  90,  18, -40], ry: 1.2  },
  { p: [  60,  35, -80], ry: 1.9  },
  { p: [  10,  45, -110], ry: 2.4 },
  { p: [ -40,  28, -100], ry: 3.0 },
  { p: [ -80,  22,  -60], ry: 3.6 },
  { p: [-100,  40,   0],  ry: 4.0 },
  { p: [ -80,  55,  60],  ry: 4.7 },
  { p: [ -40,  38,  90],  ry: 5.2 },
  { p: [   5,  60, 100],  ry: 5.8 },
  { p: [  50,  70,  80],  ry: 0.5, rz: 0.3  },
  { p: [  80,  55,  30],  ry: 1.0, rz: -0.3 },
  { p: [  60,  80, -20],  ry: 1.5  },
  { p: [  20,  90,  10],  ry: 2.0  },
];

for (const d of ringData) {
  const pos  = new THREE.Vector3(...d.p);
  const mesh = createRing(pos, d.ry ?? 0, d.rz ?? 0);
  rings.push({ mesh, collected: false, pos });
  scene.add(mesh);
}

// Next-ring indicator arrow
const arrowMat  = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
const arrowMesh = new THREE.Mesh(new THREE.ConeGeometry(0.35, 1.2, 6), arrowMat);
scene.add(arrowMesh);

// ─── Controls ─────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ─── Flight state ─────────────────────────────────────────────────────────────
const planePos  = new THREE.Vector3(0, 35, -30);
const planeQuat = new THREE.Quaternion();
const planeVel  = new THREE.Vector3(0, 0, 18);

let throttle = 0.55;
let score    = 0;
let nextRing = 0;
let finished = false;

// ─── Camera state ─────────────────────────────────────────────────────────────
const camPos    = new THREE.Vector3(0, 38, -42);
const camLookAt = new THREE.Vector3(0, 35, 0);

// ─── Tmp vectors ──────────────────────────────────────────────────────────────
const _fwd  = new THREE.Vector3();
const _up   = new THREE.Vector3();
const _rgt  = new THREE.Vector3();
const _q    = new THREE.Quaternion();
const _v    = new THREE.Vector3();

// ─── HUD refs ─────────────────────────────────────────────────────────────────
const scoreEl   = document.getElementById('score');
const speedEl   = document.getElementById('speed');
const altEl     = document.getElementById('altitude');
const tbarEl    = document.getElementById('throttle-bar');
const nextDistEl= document.getElementById('next-dist');
const finishEl  = document.getElementById('finish-msg');

// ─── Timer ────────────────────────────────────────────────────────────────────
let lastTime = performance.now();

// ─── Main loop ────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 1000, 0.05);
  lastTime  = now;

  if (!finished) update(dt);

  renderer.render(scene, camera);
}

function update(dt) {
  // ── Input ──────────────────────────────────────────────────────────────────
  const pitchIn = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);  // W = nose up
  const rollIn  = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);  // D = roll right
  const yawIn   = (keys['KeyQ'] ? 1 : 0) - (keys['KeyE'] ? 1 : 0);  // Q = yaw left

  if (keys['ShiftLeft'] || keys['ShiftRight']) throttle = Math.min(1.0, throttle + dt * 0.6);
  if (keys['ControlLeft'] || keys['ControlRight']) throttle = Math.max(0.05, throttle - dt * 0.6);

  // ── Local axes ─────────────────────────────────────────────────────────────
  _fwd.set(0, 0, 1).applyQuaternion(planeQuat);   // +Z = forward (nose)
  _up .set(0, 1, 0).applyQuaternion(planeQuat);
  _rgt.set(1, 0, 0).applyQuaternion(planeQuat);

  // ── Rotation ───────────────────────────────────────────────────────────────
  const pitchRate = 1.4;
  const rollRate  = 1.8;
  const yawRate   = 0.7;

  if (pitchIn !== 0) {
    _q.setFromAxisAngle(_rgt, -pitchIn * pitchRate * dt);
    planeQuat.premultiply(_q);
  }
  if (rollIn !== 0) {
    _q.setFromAxisAngle(_fwd, rollIn * rollRate * dt);
    planeQuat.premultiply(_q);
  }
  if (yawIn !== 0) {
    _q.setFromAxisAngle(_up, -yawIn * yawRate * dt);
    planeQuat.premultiply(_q);
  }

  // Coordinated turn: banked roll causes natural yaw
  _up.set(0, 1, 0).applyQuaternion(planeQuat);
  const bank = _up.x;  // lateral tilt → generates yaw
  _q.setFromAxisAngle(new THREE.Vector3(0, 1, 0), -bank * 0.35 * dt);
  planeQuat.premultiply(_q);

  planeQuat.normalize();

  // ── Thrust & velocity ──────────────────────────────────────────────────────
  _fwd.set(0, 0, 1).applyQuaternion(planeQuat);
  const targetSpeed = throttle * 55;  // km/h-ish units, actually m/s * factor

  // Blend velocity toward forward direction
  const blendT = Math.min(1, dt * 1.5);
  planeVel.lerp(_fwd.clone().multiplyScalar(targetSpeed), blendT);

  // Gravity (less effect when nose is aligned horizontally and throttle is up)
  const gravScale = (1 - Math.abs(_fwd.y) * 0.4) * (1 - throttle * 0.4);
  planeVel.y -= 9.8 * gravScale * dt;

  // Lift (counteracts gravity roughly when wings are level and throttle up)
  _up.set(0, 1, 0).applyQuaternion(planeQuat);
  const liftFactor = Math.max(0, _up.y) * throttle;
  planeVel.y += 9.8 * liftFactor * 0.85 * dt;

  // Light drag
  planeVel.multiplyScalar(1 - 0.4 * dt);

  // Move
  planePos.addScaledVector(planeVel, dt);

  // Ground clamp
  if (planePos.y < 3) {
    planePos.y = 3;
    if (planeVel.y < 0) planeVel.y = 0;
  }

  // ── Plane mesh ─────────────────────────────────────────────────────────────
  planeGroup.position.copy(planePos);
  planeGroup.quaternion.copy(planeQuat);

  // ── Camera ─────────────────────────────────────────────────────────────────
  _fwd.set(0, 0, 1).applyQuaternion(planeQuat);
  _up .set(0, 1, 0).applyQuaternion(planeQuat);

  const camBehind = _fwd.clone().multiplyScalar(-12);
  const camAbove  = _up .clone().multiplyScalar(3.0);
  const wantCam   = planePos.clone().add(camBehind).add(camAbove);

  camPos.lerp(wantCam, dt * 6);
  camera.position.copy(camPos);

  const lookAhead = planePos.clone().addScaledVector(_fwd, 8);
  camLookAt.lerp(lookAhead, dt * 8);
  camera.lookAt(camLookAt);

  // ── Exhaust trails ─────────────────────────────────────────────────────────
  for (const trail of trailSides) {
    const side = trail[0].side;
    // Local position of engine exhaust port: back of nacelle, under wing
    const local = new THREE.Vector3(side * 2.0, -0.22, -0.78);
    const world = planeGroup.localToWorld(local.clone());

    for (let i = trail.length - 1; i > 0; i--) {
      trail[i].mesh.position.copy(trail[i - 1].mesh.position);
    }
    trail[0].mesh.position.copy(world);

    // Opacity driven by throttle
    for (let i = 0; i < trail.length; i++) {
      const a = (1 - i / trail.length) * 0.3 * throttle;
      trail[i].mesh.material.opacity = a;
    }
  }

  // ── Ring logic ─────────────────────────────────────────────────────────────
  if (nextRing < rings.length) {
    const r    = rings[nextRing];
    const dist = planePos.distanceTo(r.pos);

    if (dist < RING_COLLECT) {
      r.collected = true;
      r.mesh.visible = false;
      score++;
      nextRing++;
      scoreEl.textContent = `Rings: ${score} / ${RING_COUNT}`;

      if (nextRing >= rings.length) {
        finished = true;
        finishEl.style.display = 'block';
        arrowMesh.visible = false;
      }
    }

    // Arrow indicator
    if (!finished) {
      const dir = r.pos.clone().sub(planePos).normalize();
      arrowMesh.position.copy(planePos).addScaledVector(dir, 5);
      arrowMesh.lookAt(r.pos);
      arrowMesh.rotateX(Math.PI / 2);
      arrowMesh.visible = true;
      nextDistEl.textContent = `Next ring: ${Math.round(dist)} m`;
    }
  }

  // Ring spin animation
  for (const r of rings) {
    if (!r.collected) r.mesh.rotation.y += dt * 0.4;
  }

  // ── Cloud drift ────────────────────────────────────────────────────────────
  for (const c of clouds) {
    c.position.x += dt * 3;
    if (c.position.x > 300) c.position.x = -300;
  }

  // ── Sun tracking ───────────────────────────────────────────────────────────
  sun.position.set(planePos.x + 80, 150, planePos.z + 60);
  sun.target.position.copy(planePos);
  sun.target.updateMatrixWorld();

  // ── HUD ────────────────────────────────────────────────────────────────────
  const kmh = Math.round(planeVel.length() * 3.6);
  speedEl.textContent = `Speed: ${kmh} km/h`;
  altEl.textContent   = `ALT: ${Math.round(planePos.y)} m`;
  tbarEl.style.width  = `${Math.round(throttle * 100)}%`;
}

animate();
</script>
</body>
</html>
