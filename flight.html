<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Flight Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }

/* ── HUD ─────────────────────────────────────────────────────────── */
#hud {
  position: absolute; top: 0; left: 0;
  color: #fff; padding: 16px 20px;
  pointer-events: none;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
}
#score { font-size: 24px; font-weight: bold; letter-spacing: 1px; }
#speed { font-size: 13px; opacity: 0.85; margin-top: 5px; }
#throttle-bar-wrap {
  margin-top: 7px; width: 130px; height: 5px;
  background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden;
}
#throttle-bar {
  height: 100%; width: 55%;
  background: linear-gradient(90deg, #00cc66, #ffcc00);
  border-radius: 3px; transition: width 0.08s;
}
#lives { font-size: 18px; margin-top: 8px; letter-spacing: 3px; color: #ff4444; }
#auto-badge {
  display: none; margin-top: 8px;
  background: #00aaff; color: #fff;
  font-size: 11px; font-weight: bold; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 4px;
}

/* ── Top-right info ───────────────────────────────────────────────── */
#info-panel {
  position: absolute; top: 16px; right: 20px;
  color: #fff; font-size: 13px;
  pointer-events: none;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  text-align: right; line-height: 1.7;
}
#next-dist { font-size: 11px; opacity: 0.65; }

/* ── Crosshair ───────────────────────────────────────────────────── */
#xhair {
  position: absolute; top: 50%; left: 50%;
  width: 18px; height: 18px;
  transform: translate(-50%,-50%);
  pointer-events: none;
}
#xhair::before, #xhair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.55);
}
#xhair::before { left:50%; top:0; width:1px; height:100%; transform:translateX(-50%); }
#xhair::after  { top:50%; left:0; height:1px; width:100%; transform:translateY(-50%); }

/* ── Hint ─────────────────────────────────────────────────────────── */
#hint {
  position: absolute; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.5); font-size: 11px;
  pointer-events: none; white-space: nowrap; text-align: center;
}

/* ── Crash overlay ────────────────────────────────────────────────── */
#crash-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(220,30,30,0.55);
  color: #fff; font-size: 52px; font-weight: bold;
  justify-content: center; align-items: center;
  text-shadow: 0 3px 10px rgba(0,0,0,0.8);
  letter-spacing: 4px; pointer-events: none;
}

/* ── Respawn banner ───────────────────────────────────────────────── */
#respawn-banner {
  display: none; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: rgba(255,255,255,0.9); font-size: 20px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  pointer-events: none;
}

/* ── Game-over / Finish ───────────────────────────────────────────── */
#end-screen {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  color: #fff; text-align: center;
  justify-content: center; align-items: center;
  flex-direction: column; gap: 12px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  pointer-events: none;
}
#end-screen h1 { font-size: 52px; }
#end-screen p  { font-size: 18px; opacity: 0.8; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="hud">
  <div id="score">Rings: 0 / 15</div>
  <div id="speed">Speed: 0 km/h &nbsp;|&nbsp; Throttle: 55%</div>
  <div id="throttle-bar-wrap"><div id="throttle-bar"></div></div>
  <div id="lives">♥ ♥ ♥</div>
  <div id="auto-badge">✈ AUTOPILOT ON</div>
</div>

<div id="info-panel">
  ALT: <span id="alt-val">0</span> m<br>
  <span id="next-dist"></span>
</div>

<div id="xhair"></div>

<div id="hint">
  W/S · Pitch &nbsp;|&nbsp; A/D · Roll &nbsp;|&nbsp; Q/E · Yaw &nbsp;|&nbsp;
  Shift · Throttle+ &nbsp;|&nbsp; Ctrl · Throttle− &nbsp;|&nbsp;
  <b>Tab · Autopilot</b>
</div>

<div id="crash-overlay">CRASHED!</div>
<div id="respawn-banner">Respawning…</div>
<div id="end-screen">
  <h1 id="end-title"></h1>
  <p id="end-sub"></p>
</div>

<script type="module">
import * as THREE from 'three';

// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Scene / Camera ──────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x90c8f0, 0.0028);
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 700);

// ─── Lighting ────────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff0d0, 3.5);
sun.position.set(80, 160, 60);
sun.castShadow = true;
sun.shadow.mapSize.setScalar(2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 500;
sun.shadow.camera.left = sun.shadow.camera.bottom = -220;
sun.shadow.camera.right = sun.shadow.camera.top   =  220;
sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x8ec8ef, 0x4a7a32, 1.8));
scene.add(new THREE.AmbientLight(0xffffff, 0.35));

// ─── Sky dome ────────────────────────────────────────────────────────────────
{
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      top:    { value: new THREE.Color(0x1560b0) },
      bottom: { value: new THREE.Color(0x90c8f0) },
    },
    vertexShader: `
      varying float vY;
      void main() {
        vY = normalize((modelMatrix * vec4(position,1.0)).xyz).y;
        gl_Position = projectionMatrix * viewMatrix * modelMatrix * vec4(position,1.0);
      }`,
    fragmentShader: `
      uniform vec3 top; uniform vec3 bottom;
      varying float vY;
      void main() { gl_FragColor = vec4(mix(bottom, top, smoothstep(-0.1, 0.4, vY)), 1.0); }`,
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(600, 16, 8), skyMat));
}

// ─── Shared terrain height ───────────────────────────────────────────────────
function getTerrainHeight(x, z) {
  let h = Math.sin(x * 0.018) * 12 + Math.cos(z * 0.015) * 10 +
           Math.sin(x * 0.055 + z * 0.040) * 5 +
           Math.cos(x * 0.080 - z * 0.070) * 3;
  // Mountain peaks at the four far corners
  for (const [px, pz, ph] of [[220,190,42],[-200,175,38],[175,-215,46],[-195,-195,40]]) {
    const d = Math.hypot(x - px, z - pz);
    if (d < 75) h += ph * Math.pow(1 - d / 75, 2);
  }
  return h;
}

// ─── Terrain mesh (vertex colours: sand / grass / rock / snow) ───────────────
const T_SIZE = 900, T_SEG = 130;
const terrainGeo = new THREE.PlaneGeometry(T_SIZE, T_SIZE, T_SEG, T_SEG);
terrainGeo.rotateX(-Math.PI / 2);

const tPos = terrainGeo.attributes.position;
const colors = new Float32Array(tPos.count * 3);
const C_SAND  = new THREE.Color(0xc8a86a);
const C_GRASS = new THREE.Color(0x4a7c35);
const C_ROCK  = new THREE.Color(0x8a7e6e);
const C_SNOW  = new THREE.Color(0xeef2f8);
const _c = new THREE.Color();

for (let i = 0; i < tPos.count; i++) {
  const x = tPos.getX(i), z = tPos.getZ(i);
  const h = getTerrainHeight(x, z);
  tPos.setY(i, h);

  if      (h < 1)  _c.copy(C_SAND);
  else if (h < 12) _c.lerpColors(C_SAND, C_GRASS, (h - 1) / 11);
  else if (h < 28) _c.copy(C_GRASS);
  else if (h < 38) _c.lerpColors(C_GRASS, C_ROCK, (h - 28) / 10);
  else             _c.lerpColors(C_ROCK, C_SNOW,  Math.min(1, (h - 38) / 12));

  colors[i * 3]     = _c.r;
  colors[i * 3 + 1] = _c.g;
  colors[i * 3 + 2] = _c.b;
}
terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
terrainGeo.computeVertexNormals();

const terrain = new THREE.Mesh(terrainGeo, new THREE.MeshLambertMaterial({ vertexColors: true }));
terrain.receiveShadow = true;
scene.add(terrain);

// Sea plane
const sea = new THREE.Mesh(
  new THREE.PlaneGeometry(T_SIZE, T_SIZE),
  new THREE.MeshLambertMaterial({ color: 0x1e6fab, transparent: true, opacity: 0.85 })
);
sea.rotation.x = -Math.PI / 2;
sea.position.y = 0.2;
scene.add(sea);

// ─── Trees (InstancedMesh) ───────────────────────────────────────────────────
{
  const treePos = [];
  const rng = (a, b) => a + Math.random() * (b - a);
  for (let i = 0; i < 800; i++) {
    const tx = rng(-380, 380), tz = rng(-380, 380);
    const ty = getTerrainHeight(tx, tz);
    if (ty > 1.5 && ty < 30) treePos.push([tx, ty, tz]);
  }
  const N = treePos.length;
  const dummy = new THREE.Object3D();

  // Trunks
  const trunkMesh = new THREE.InstancedMesh(
    new THREE.CylinderGeometry(0.28, 0.38, 3.2, 6),
    new THREE.MeshLambertMaterial({ color: 0x5a3818 }), N
  );
  trunkMesh.castShadow = true;

  // Foliage (two tiers)
  const fol1 = new THREE.InstancedMesh(
    new THREE.ConeGeometry(2.8, 4.5, 7),
    new THREE.MeshLambertMaterial({ color: 0x2e6b25 }), N
  );
  const fol2 = new THREE.InstancedMesh(
    new THREE.ConeGeometry(2.0, 3.5, 7),
    new THREE.MeshLambertMaterial({ color: 0x3a8530 }), N
  );
  fol1.castShadow = fol2.castShadow = true;

  for (let i = 0; i < N; i++) {
    const [tx, ty, tz] = treePos[i];
    const s = 0.7 + Math.random() * 0.7;
    const ry = Math.random() * Math.PI * 2;

    dummy.position.set(tx, ty + 1.6 * s, tz);
    dummy.rotation.y = ry; dummy.scale.setScalar(s); dummy.updateMatrix();
    trunkMesh.setMatrixAt(i, dummy.matrix);

    dummy.position.set(tx, ty + 4.5 * s, tz);
    dummy.updateMatrix();
    fol1.setMatrixAt(i, dummy.matrix);

    dummy.position.set(tx, ty + 6.8 * s, tz);
    dummy.updateMatrix();
    fol2.setMatrixAt(i, dummy.matrix);
  }
  trunkMesh.instanceMatrix.needsUpdate = true;
  fol1.instanceMatrix.needsUpdate = true;
  fol2.instanceMatrix.needsUpdate = true;
  scene.add(trunkMesh, fol1, fol2);
}

// ─── Wind turbines ───────────────────────────────────────────────────────────
const turbineBladeGroups = [];
for (const [tx, tz] of [[-60, 55], [85, -30], [-90, -75]]) {
  const ty = getTerrainHeight(tx, tz);
  const g  = new THREE.Group();
  g.position.set(tx, ty, tz);

  // Tower
  const tower = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.7, 22, 8),
    new THREE.MeshLambertMaterial({ color: 0xd8d8d8 })
  );
  tower.position.y = 11; tower.castShadow = true;
  g.add(tower);

  // Nacelle
  const nacelle = new THREE.Mesh(
    new THREE.BoxGeometry(3, 1.5, 1.5),
    new THREE.MeshLambertMaterial({ color: 0xcccccc })
  );
  nacelle.position.y = 22.5; nacelle.castShadow = true;
  g.add(nacelle);

  // Blades (rotating group)
  const bladeGroup = new THREE.Group();
  bladeGroup.position.set(1.6, 22.5, 0);
  const bladeMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee });
  for (let b = 0; b < 3; b++) {
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.3, 9, 0.15), bladeMat);
    blade.position.y = 4.5;
    blade.rotation.z = (b / 3) * Math.PI * 2;
    bladeGroup.add(blade);
  }
  bladeGroup.rotation.x = Math.PI / 2;
  g.add(bladeGroup);
  turbineBladeGroups.push(bladeGroup);

  scene.add(g);
}

// ─── Hot-air balloon ─────────────────────────────────────────────────────────
const balloon = new THREE.Group();
balloon.position.set(-50, 60, 30);
{
  // Envelope
  const envMat = new THREE.MeshLambertMaterial({ color: 0xff6622 });
  const stripeMat = new THREE.MeshLambertMaterial({ color: 0xffdd00 });
  balloon.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(5, 16, 12), envMat), {}));
  for (let s = 0; s < 6; s++) {
    const stripe = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 9.5, 0.6),
      s % 2 === 0 ? envMat : stripeMat
    );
    stripe.rotation.y = (s / 6) * Math.PI * 2;
    stripe.position.x = Math.cos((s / 6) * Math.PI * 2) * 4.2;
    stripe.position.z = Math.sin((s / 6) * Math.PI * 2) * 4.2;
    stripe.position.y = -1.5;
    balloon.add(stripe);
  }
  // Basket
  const basket = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 1.4, 2.2),
    new THREE.MeshLambertMaterial({ color: 0x8b5a2b })
  );
  basket.position.y = -7;
  balloon.add(basket);
  // Ropes
  const ropeMat = new THREE.LineBasicMaterial({ color: 0x8b5a2b });
  for (const [rx, rz] of [[0.9,0.9],[-0.9,0.9],[0.9,-0.9],[-0.9,-0.9]]) {
    const pts = [new THREE.Vector3(rx, -5.2, rz), new THREE.Vector3(rx, -6.3, rz)];
    balloon.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), ropeMat));
  }
}
scene.add(balloon);

// ─── Clouds ──────────────────────────────────────────────────────────────────
const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.80 });
function makeCloud(x, y, z, sc = 1) {
  const g = new THREE.Group();
  for (const [s, p] of [
    [[3.5,2.2,2.5],[0,0,0]], [[2.5,1.8,2],[3,-0.2,0.5]], [[2,1.6,1.8],[-2.8,-0.3,-0.3]],
    [[2.2,1.5,1.9],[1,0.8,1.2]], [[1.8,1.4,1.6],[-1.2,0.6,-1]],
  ]) {
    const m = new THREE.Mesh(new THREE.SphereGeometry(1, 7, 5), cloudMat);
    m.scale.set(...s); m.position.set(...p);
    g.add(m);
  }
  g.scale.setScalar(sc); g.position.set(x, y, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  return g;
}
const clouds = [];
for (let i = 0; i < 60; i++) {
  const c = makeCloud(
    (Math.random() - 0.5) * 700,
    18 + Math.random() * 70,
    (Math.random() - 0.5) * 700,
    0.8 + Math.random() * 1.6
  );
  clouds.push(c); scene.add(c);
}

// ─── Airplane model (nose = +Z local) ────────────────────────────────────────
function buildPlane() {
  const root = new THREE.Group();
  const bM = new THREE.MeshLambertMaterial({ color: 0xdde2ec });
  const wM = new THREE.MeshLambertMaterial({ color: 0xc8cfdf });
  const eM = new THREE.MeshLambertMaterial({ color: 0x77788a });
  const gM = new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.65 });
  const rM = new THREE.MeshLambertMaterial({ color: 0xcc3322 });

  const add = (geo, mat, px=0, py=0, pz=0, rx=0, ry=0, rz=0) => {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(px,py,pz); m.rotation.set(rx,ry,rz);
    m.castShadow = true; root.add(m); return m;
  };

  // Fuselage
  add(new THREE.CylinderGeometry(0.28,0.18,4.0,10), bM, 0,0,0, Math.PI/2,0,0);
  // Nose
  add(new THREE.ConeGeometry(0.28,1.0,10), bM, 0,0,2.5, -Math.PI/2,0,0);
  // Tail
  add(new THREE.ConeGeometry(0.18,0.8,8),  bM, 0,0,-2.4, Math.PI/2,0,0);
  // Main wings
  add(new THREE.BoxGeometry(7.5,0.10,2.0), wM, 0,0,-0.3);
  // Wing tips
  for (const s of [-1,1]) {
    const t = add(new THREE.BoxGeometry(1.8,0.08,1.2), wM, s*4.2,0.2,-0.3);
    t.rotation.z = s * 0.18;
  }
  // H-stab
  add(new THREE.BoxGeometry(3.2,0.08,0.9), wM, 0,0,-2.0);
  // V-fin
  add(new THREE.BoxGeometry(0.08,1.1,1.0), wM, 0,0.55,-2.0);
  // Nacelles
  for (const s of [-1,1]) {
    add(new THREE.CylinderGeometry(0.22,0.18,1.2,8), eM, s*2.0,-0.22,-0.15, Math.PI/2,0,0);
    const disc = new THREE.Mesh(new THREE.CircleGeometry(0.38,16),
      new THREE.MeshLambertMaterial({ color:0x222233, transparent:true, opacity:0.5, side:THREE.DoubleSide }));
    disc.position.set(s*2.0,-0.22,0.45); root.add(disc);
    add(new THREE.CylinderGeometry(0.20,0.22,0.1,8), eM, s*2.0,-0.22,-0.78, Math.PI/2,0,0);
  }
  // Canopy
  const cap = new THREE.Mesh(
    new THREE.SphereGeometry(0.28,8,6,0,Math.PI*2,0,Math.PI*0.55), gM);
  cap.position.set(0,0.32,0.9); cap.rotation.x = 0.2; root.add(cap);
  // Red stripes
  for (const s of [-1,1])
    add(new THREE.BoxGeometry(0.04,0.10,3.6), rM, s*0.28,0,0);

  return root;
}
const planeGroup = buildPlane();
scene.add(planeGroup);

// ─── Exhaust trails ──────────────────────────────────────────────────────────
const TRAIL_LEN = 26;
const trailSides = [-1,1].map(side => Array.from({length: TRAIL_LEN}, (_, i) => {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.13 * (1 - i/TRAIL_LEN*0.55), 4, 3),
    new THREE.MeshBasicMaterial({ color:0xddddff, transparent:true, opacity:0 })
  );
  scene.add(mesh);
  return { mesh, side };
}));

// ─── Rings ───────────────────────────────────────────────────────────────────
const RING_COUNT = 15, RING_R = 5.5, RING_GRAB = 6.2;
const rings = [];

function createRing(pos, ry=0, rz=0) {
  const g = new THREE.Group();
  g.add(Object.assign(new THREE.Mesh(
    new THREE.TorusGeometry(RING_R, 0.44, 14, 40),
    new THREE.MeshLambertMaterial({ color:0xff8800, emissive:0x331100 })
  ), { castShadow: true }));

  const d1 = new THREE.Mesh(new THREE.CircleGeometry(RING_R,40),
    new THREE.MeshBasicMaterial({ color:0xffdd55, transparent:true, opacity:0.15, side:THREE.DoubleSide }));
  const d2 = new THREE.Mesh(new THREE.RingGeometry(RING_R-0.6,RING_R+0.6,40),
    new THREE.MeshBasicMaterial({ color:0xffaa00, transparent:true, opacity:0.30, side:THREE.DoubleSide }));
  g.add(d1, d2);

  for (const sy of [RING_R+0.75, -(RING_R+0.75)]) {
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,1.5,6),
      new THREE.MeshLambertMaterial({ color:0xffffff }));
    pole.position.y = sy; g.add(pole);
  }

  g.position.copy(pos); g.rotation.y = ry; g.rotation.z = rz;
  return g;
}

// Ring course – all at safe altitude (min 37 m)
const ringData = [
  { p:[  30, 37,  40], ry:0.3 }, { p:[ 70, 45,  10], ry:0.8 },
  { p:[  90, 37, -40], ry:1.2 }, { p:[ 60, 50, -80], ry:1.9 },
  { p:[  10, 60,-110], ry:2.4 }, { p:[-40, 43,-100], ry:3.0 },
  { p:[ -80, 37, -60], ry:3.6 }, { p:[-100,55,   0], ry:4.0 },
  { p:[ -80, 70,  60], ry:4.7 }, { p:[-40, 53,  90], ry:5.2 },
  { p:[   5, 75, 100], ry:5.8 }, { p:[ 50, 85,  80], ry:0.5, rz:0.3 },
  { p:[  80, 70,  30], ry:1.0, rz:-0.3 },
  { p:[  60, 95, -20], ry:1.5 }, { p:[ 20,105,  10], ry:2.0 },
];
for (const d of ringData) {
  const pos  = new THREE.Vector3(...d.p);
  const mesh = createRing(pos, d.ry ?? 0, d.rz ?? 0);
  rings.push({ mesh, pos, collected: false });
  scene.add(mesh);
}

// Next-ring arrow
const arrowMesh = new THREE.Mesh(
  new THREE.ConeGeometry(0.38,1.3,6),
  new THREE.MeshBasicMaterial({ color:0x00ff88 })
);
scene.add(arrowMesh);

// ─── Controls ────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Tab') { e.preventDefault(); toggleAutopilot(); }
  else e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Flight state ─────────────────────────────────────────────────────────────
const SPAWN   = new THREE.Vector3(0, 40, -30);
const planePos  = SPAWN.clone();
const planeQuat = new THREE.Quaternion();
const planeVel  = new THREE.Vector3(0, 0, 18);

let throttle  = 0.55;
let score     = 0;
let nextRing  = 0;
let lives     = 3;
let finished  = false;

// ── Crash / respawn state ────────────────────────────────────────────────────
let crashed      = false;
let crashTimer   = 0;
let invincible   = false;
let invTimer     = 0;
const RESPAWN_T  = 2.2;
const INVINCIBLE_T = 3.5;

// ── Autopilot ────────────────────────────────────────────────────────────────
let autopilot = false;
function toggleAutopilot() {
  autopilot = !autopilot;
  document.getElementById('auto-badge').style.display = autopilot ? 'block' : 'none';
}

// ─── Camera state ────────────────────────────────────────────────────────────
const camPos    = new THREE.Vector3(0, 43, -42);
const camLookAt = new THREE.Vector3(0, 40, 0);

// ─── Tmp vectors ─────────────────────────────────────────────────────────────
const _fwd = new THREE.Vector3();
const _up  = new THREE.Vector3();
const _rgt = new THREE.Vector3();
const _q   = new THREE.Quaternion();

// ─── HUD refs ─────────────────────────────────────────────────────────────────
const scoreEl      = document.getElementById('score');
const speedEl      = document.getElementById('speed');
const tbarEl       = document.getElementById('throttle-bar');
const livesEl      = document.getElementById('lives');
const altVal       = document.getElementById('alt-val');
const nextDistEl   = document.getElementById('next-dist');
const crashOverlay = document.getElementById('crash-overlay');
const respawnBnr   = document.getElementById('respawn-banner');
const endScreen    = document.getElementById('end-screen');
const endTitle     = document.getElementById('end-title');
const endSub       = document.getElementById('end-sub');

function updateLivesHUD() {
  livesEl.textContent = '♥ '.repeat(lives).trim() || '✕';
}

// ─── Crash / respawn helpers ──────────────────────────────────────────────────
function triggerCrash() {
  if (crashed || invincible) return;
  crashed    = true;
  crashTimer = RESPAWN_T;

  crashOverlay.style.display = 'flex';
  setTimeout(() => { crashOverlay.style.display = 'none'; }, 700);

  lives--;
  updateLivesHUD();

  if (lives <= 0) {
    endTitle.textContent = 'GAME OVER';
    endSub.textContent   = `You collected ${score} / ${RING_COUNT} rings.`;
    endScreen.style.display = 'flex';
    finished = true;
  } else {
    respawnBnr.style.display = 'block';
  }
}

function respawn() {
  planePos.copy(SPAWN);
  planeQuat.identity();
  planeVel.set(0, 0, 18);
  throttle   = 0.55;
  crashed    = false;
  invincible = true;
  invTimer   = INVINCIBLE_T;
  respawnBnr.style.display = 'none';
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 1000, 0.05);
  lastTime  = now;

  if (!finished) update(dt);
  renderer.render(scene, camera);
}

function update(dt) {
  // ── Invincibility countdown ────────────────────────────────────────────────
  if (invincible) {
    invTimer -= dt;
    if (invTimer <= 0) invincible = false;
  }

  // ── Crash respawn countdown ───────────────────────────────────────────────
  if (crashed) {
    crashTimer -= dt;
    if (crashTimer <= 0) respawn();
    // Still update camera to follow dying plane
    updateCamera(dt);
    renderer.render(scene, camera);
    return;
  }

  // ── Controls → throttle ───────────────────────────────────────────────────
  if (keys['ShiftLeft']   || keys['ShiftRight'])   throttle = Math.min(1.0, throttle + dt * 0.65);
  if (keys['ControlLeft'] || keys['ControlRight']) throttle = Math.max(0.05, throttle - dt * 0.65);

  // ── Manual rotation inputs ────────────────────────────────────────────────
  const pitchIn = (keys['KeyW'] ? 1:0) - (keys['KeyS'] ? 1:0);
  const rollIn  = (keys['KeyD'] ? 1:0) - (keys['KeyA'] ? 1:0);
  const yawIn   = (keys['KeyQ'] ? 1:0) - (keys['KeyE'] ? 1:0);

  _fwd.set(0,0,1).applyQuaternion(planeQuat);
  _up .set(0,1,0).applyQuaternion(planeQuat);
  _rgt.set(1,0,0).applyQuaternion(planeQuat);

  if (!autopilot) {
    if (pitchIn) { _q.setFromAxisAngle(_rgt, -pitchIn * 1.4 * dt); planeQuat.premultiply(_q); }
    if (rollIn)  { _q.setFromAxisAngle(_fwd,  rollIn  * 1.8 * dt); planeQuat.premultiply(_q); }
    if (yawIn)   { _q.setFromAxisAngle(_up,  -yawIn   * 0.7 * dt); planeQuat.premultiply(_q); }

    // Coordinated turn
    _up.set(0,1,0).applyQuaternion(planeQuat);
    _q.setFromAxisAngle(new THREE.Vector3(0,1,0), -_up.x * 0.35 * dt);
    planeQuat.premultiply(_q);
  } else {
    // ── Autopilot: steer toward next ring ─────────────────────────────────
    if (nextRing < rings.length) {
      const target    = rings[nextRing].pos;
      const toTarget  = target.clone().sub(planePos).normalize();
      _fwd.set(0,0,1).applyQuaternion(planeQuat);

      // Desired rotation: align +Z with toTarget, keep upright
      const worldUp = new THREE.Vector3(0,1,0);
      const right   = new THREE.Vector3().crossVectors(worldUp, toTarget);
      if (right.lengthSq() < 0.0001) right.set(1,0,0);
      right.normalize();
      const up2 = new THREE.Vector3().crossVectors(toTarget, right).normalize();
      const desiredQuat = new THREE.Quaternion().setFromRotationMatrix(
        new THREE.Matrix4().makeBasis(right, up2, toTarget)
      );

      // Slerp toward desired, speed scales with angle delta
      const angle = planeQuat.angleTo(desiredQuat);
      const speed = Math.min(1, angle * 3.0) * dt * 2.2;
      planeQuat.slerp(desiredQuat, Math.min(1, speed));

      // Auto-throttle
      const dist = planePos.distanceTo(target);
      throttle = dist > 60 ? 0.80 : 0.65;
    }
  }

  planeQuat.normalize();

  // ── Physics ───────────────────────────────────────────────────────────────
  _fwd.set(0,0,1).applyQuaternion(planeQuat);
  _up .set(0,1,0).applyQuaternion(planeQuat);

  planeVel.lerp(_fwd.clone().multiplyScalar(throttle * 55), Math.min(1, dt * 1.6));

  const gravScale = (1 - Math.abs(_fwd.y) * 0.4) * (1 - throttle * 0.4);
  planeVel.y -= 9.8 * gravScale * dt;
  planeVel.y += 9.8 * Math.max(0, _up.y) * throttle * 0.85 * dt;
  planeVel.multiplyScalar(1 - 0.35 * dt);

  planePos.addScaledVector(planeVel, dt);

  // ── Terrain / sea collision ───────────────────────────────────────────────
  const terrY = getTerrainHeight(planePos.x, planePos.z);
  const seaY  = 0.8;
  const floor = Math.max(terrY + 2.2, seaY);

  if (planePos.y < floor) {
    if (!invincible) {
      triggerCrash();
    } else {
      planePos.y = floor + 0.5;
      if (planeVel.y < 0) planeVel.y = 1;
    }
  }

  // ── Mesh update ───────────────────────────────────────────────────────────
  planeGroup.position.copy(planePos);
  planeGroup.quaternion.copy(planeQuat);

  // ── Camera ────────────────────────────────────────────────────────────────
  updateCamera(dt);

  // ── Exhaust trails ────────────────────────────────────────────────────────
  for (const trail of trailSides) {
    const side = trail[0].side;
    const world = planeGroup.localToWorld(new THREE.Vector3(side*2.0,-0.22,-0.78));
    for (let i = trail.length-1; i > 0; i--)
      trail[i].mesh.position.copy(trail[i-1].mesh.position);
    trail[0].mesh.position.copy(world);
    for (let i = 0; i < trail.length; i++)
      trail[i].mesh.material.opacity = (1 - i/trail.length) * 0.28 * throttle;
  }

  // ── Ring collection ───────────────────────────────────────────────────────
  if (nextRing < rings.length) {
    const r    = rings[nextRing];
    const dist = planePos.distanceTo(r.pos);

    if (dist < RING_GRAB) {
      r.collected = true;
      r.mesh.visible = false;
      score++;
      nextRing++;
      scoreEl.textContent = `Rings: ${score} / ${RING_COUNT}`;

      if (nextRing >= rings.length) {
        finished = true;
        endTitle.textContent = '✈ All Rings Cleared!';
        endSub.textContent   = 'Excellent flying! Refresh to play again.';
        endScreen.style.display = 'flex';
        arrowMesh.visible = false;
      }
    }

    // Arrow + distance
    if (!finished) {
      const dir = r.pos.clone().sub(planePos).normalize();
      arrowMesh.position.copy(planePos).addScaledVector(dir, 5.5);
      arrowMesh.lookAt(r.pos);
      arrowMesh.rotateX(Math.PI / 2);
      arrowMesh.visible = !invincible || Math.floor(invTimer * 6) % 2 === 0;
      nextDistEl.textContent = `Next ring: ${Math.round(dist)} m`;
    }
  }

  // ── Ring spin ─────────────────────────────────────────────────────────────
  for (const r of rings) if (!r.collected) r.mesh.rotation.y += dt * 0.4;

  // ── Turbine blades ────────────────────────────────────────────────────────
  for (const bg of turbineBladeGroups) bg.rotation.z += dt * 1.2;

  // ── Balloon drift ─────────────────────────────────────────────────────────
  balloon.position.x += Math.sin(lastTime * 0.0003) * dt * 1.5;
  balloon.position.z += Math.cos(lastTime * 0.0002) * dt * 1.0;

  // ── Cloud drift ───────────────────────────────────────────────────────────
  for (const c of clouds) {
    c.position.x += dt * 2.5;
    if (c.position.x > 350) c.position.x = -350;
  }

  // ── Sun tracks plane ──────────────────────────────────────────────────────
  sun.position.set(planePos.x+80, 160, planePos.z+60);
  sun.target.position.copy(planePos);
  sun.target.updateMatrixWorld();

  // ── HUD ───────────────────────────────────────────────────────────────────
  speedEl.textContent = `Speed: ${Math.round(planeVel.length()*3.6)} km/h  |  Throttle: ${Math.round(throttle*100)}%`;
  altVal.textContent  = Math.round(planePos.y);
  tbarEl.style.width  = `${Math.round(throttle*100)}%`;
}

function updateCamera(dt) {
  _fwd.set(0,0,1).applyQuaternion(planeQuat);
  _up .set(0,1,0).applyQuaternion(planeQuat);
  camPos.lerp(
    planePos.clone().addScaledVector(_fwd,-12).addScaledVector(_up, 3.0), dt*6
  );
  camera.position.copy(camPos);
  camLookAt.lerp(planePos.clone().addScaledVector(_fwd, 8), dt*8);
  camera.lookAt(camLookAt);
}

updateLivesHUD();
animate();
</script>
</body>
